services:
  postgres:
    image: postgres:16
    container_name: bennystock_postgres
    environment:
      POSTGRES_DB: BennyStockDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bennystock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bennystock_app
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=BennyStockDB;Username=postgres;Password=1234
    depends_on:
      - postgres

volumes:
  postgres_data: